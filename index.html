<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>我的设备信息</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #86868b;
    --border: #e5e5ea;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 14px;
  }

  [data-theme="dark"] {
    --bg: #000000;
    --card-bg: #1c1c1e;
    --text: #f5f5f7;
    --text-secondary: #98989d;
    --border: #38383a;
    --accent: #0a84ff;
    --accent-hover: #409cff;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #000000;
      --card-bg: #1c1c1e;
      --text: #f5f5f7;
      --text-secondary: #98989d;
      --border: #38383a;
      --accent: #0a84ff;
      --accent-hover: #409cff;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    transition: background 0.3s, color 0.3s;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 16px 24px;
  }

  .header h1 {
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .header .subtitle {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-top: 6px;
  }

  /* Theme Toggle */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }

  .theme-toggle:hover {
    transform: scale(1.05);
  }

  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: inline; }

  [data-theme="dark"] .theme-toggle .icon-sun { display: inline; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .theme-toggle .icon-sun { display: inline; }
    :root:not([data-theme="light"]) .theme-toggle .icon-moon { display: none; }
  }

  /* Actions */
  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    font-size: 0.9rem;
    font-weight: 500;
    border-radius: 10px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: inherit;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
  }

  .btn-secondary {
    background: var(--card-bg);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--border);
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-mini {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 14px 12px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .stat-mini .stat-icon {
    font-size: 1.4rem;
    margin-bottom: 4px;
  }

  .stat-mini .stat-label {
    font-size: 0.7rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .stat-mini .stat-value {
    font-size: 0.95rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Sections */
  .section {
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0 14px;
    margin-bottom: 10px;
  }

  /* Card */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.15s;
  }

  .card:hover {
    transform: translateY(-1px);
  }

  .card-icon {
    font-size: 1.6rem;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    border-radius: 12px;
    flex-shrink: 0;
  }

  .card-content {
    flex: 1;
    min-width: 0;
  }

  .card-label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }

  .card-value {
    font-size: 0.95rem;
    font-weight: 500;
    word-break: break-all;
  }

  .card-value.secondary {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 400;
  }

  .card-badge {
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .badge-yes { background: #30d15822; color: #30d158; }
  .badge-no  { background: #ff453a22; color: #ff453a; }
  .badge-info { background: var(--accent); color: #fff; opacity: 0.12; }

  /* Battery bar */
  .battery-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }

  .battery-bar {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .battery-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s, background 0.5s;
    background: #30d158;
  }

  .battery-fill.warning { background: #ffcc00; }
  .battery-fill.danger { background: #ff453a; }

  /* Copy toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 200;
  }

  .toast.show { opacity: 1; }

  /* Privacy notice */
  .privacy-notice {
    text-align: center;
    padding: 20px 16px;
    color: var(--text-secondary);
    font-size: 0.78rem;
    line-height: 1.6;
  }

  .privacy-notice .lock {
    font-size: 1.1rem;
  }

  /* Loading shimmer */
  .loading {
    color: var(--text-secondary);
    font-style: italic;
  }

  /* UA string - full width card */
  .card-ua .card-value {
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 0.75rem;
    line-height: 1.5;
    color: var(--text-secondary);
  }

  @media (max-width: 480px) {
    body { padding: 10px; }
    .header { padding: 20px 8px 16px; }
    .card { padding: 14px; gap: 10px; }
    .card-icon { width: 36px; height: 36px; font-size: 1.3rem; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" aria-label="切换主题" title="切换亮色/暗色模式">
  <span class="icon-sun">☀️</span>
  <span class="icon-moon">🌙</span>
</button>

<div class="container">
  <div class="header">
    <h1>📱 我的设备信息</h1>
    <p class="subtitle">一目了然查看你的设备详情</p>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="copyAll()" id="btnCopy">
      📋 一键复制全部
    </button>
    <button class="btn btn-secondary" onclick="location.reload()">
      🔄 刷新
    </button>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="section">
    <div class="section-title">系统与浏览器</div>
    <div id="sectionSystem"></div>
  </div>

  <div class="section">
    <div class="section-title">网络与位置</div>
    <div id="sectionNetwork"></div>
  </div>

  <div class="section">
    <div class="section-title">硬件状态</div>
    <div id="sectionHardware"></div>
  </div>

  <div class="section">
    <div class="section-title">User Agent</div>
    <div class="card card-ua" id="cardUA"></div>
  </div>

  <div class="privacy-notice">
    <span class="lock">🔒</span><br>
    所有信息检测均在你的设备本地完成。<br>
    除 IP 查询外，不会向任何服务器发送你的数据。
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ Theme ============
(function() {
  const saved = localStorage.getItem('mdip-theme');
  if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  else if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();

document.getElementById('themeToggle').addEventListener('click', () => {
  const root = document.documentElement;
  const current = root.getAttribute('data-theme');
  let next;
  if (!current) {
    // system default -> check what the computed value is
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    next = isDark ? 'light' : 'dark';
  } else {
    next = current === 'dark' ? 'light' : 'dark';
  }
  root.setAttribute('data-theme', next);
  localStorage.setItem('mdip-theme', next);
});

// ============ Toast ============
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
}

// ============ Helpers ============
function card(icon, label, value, extra) {
  return `<div class="card">
    <div class="card-icon">${icon}</div>
    <div class="card-content">
      <div class="card-label">${label}</div>
      <div class="card-value">${value}</div>
      ${extra ? `<div class="card-value secondary">${extra}</div>` : ''}
    </div>
  </div>`;
}

function cardWithBadge(icon, label, value, badge, badgeClass) {
  return `<div class="card">
    <div class="card-icon">${icon}</div>
    <div class="card-content">
      <div class="card-label">${label}</div>
      <div class="card-value">${value}</div>
    </div>
    <span class="card-badge ${badgeClass}">${badge}</span>
  </div>`;
}

async function getIpFromSource(url, parser) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    if (!res.ok) throw new Error('bad status');
    const data = await res.json();
    return parser(data);
  } catch {
    return null;
  }
}

// ============ Main Detection ============
async function detectAll() {
  // --- Browser ---
  const ua = navigator.userAgent;
  let browserName = '未知';
  let browserVersion = '';
  if (ua.includes('Edg/')) { browserName = 'Microsoft Edge'; const m = ua.match(/Edg\/([\d.]+)/); browserVersion = m?.[1] || ''; }
  else if (ua.includes('OPR/') || ua.includes('Opera/')) { browserName = 'Opera'; const m = ua.match(/OPR\/([\d.]+)/); browserVersion = m?.[1] || ''; }
  else if (ua.includes('Chrome/')) { browserName = 'Google Chrome'; const m = ua.match(/Chrome\/([\d.]+)/); browserVersion = m?.[1] || ''; }
  else if (ua.includes('Safari/') && !ua.includes('Chrome/')) { browserName = 'Safari'; const m = ua.match(/Version\/([\d.]+)/); browserVersion = m?.[1] || ''; }
  else if (ua.includes('Firefox/')) { browserName = 'Firefox'; const m = ua.match(/Firefox\/([\d.]+)/); browserVersion = m?.[1] || ''; }

  // --- OS ---
  let osName = '未知';
  if (ua.includes('Windows NT')) { const m = ua.match(/Windows NT ([\d.]+)/); osName = 'Windows ' + (m?.[1] || ''); }
  else if (ua.includes('Mac OS X')) { const m = ua.match(/Mac OS X ([_\d]+)/); osName = 'macOS ' + (m?.[1]?.replace(/_/g, '.') || ''); }
  else if (ua.includes('Android')) { const m = ua.match(/Android ([\d.]+)/); osName = 'Android ' + (m?.[1] || ''); }
  else if (ua.includes('iPhone') || ua.includes('iPad')) { const m = ua.match(/OS ([\d_]+)/); osName = 'iOS ' + (m?.[1]?.replace(/_/g, '.') || ''); }
  else if (ua.includes('Linux')) osName = 'Linux';

  // --- Screen ---
  const screenW = screen.width;
  const screenH = screen.height;
  const availW = screen.availWidth;
  const availH = screen.availHeight;
  const dpr = window.devicePixelRatio || 1;
  const colorDepth = screen.colorDepth || 24;

  // --- Language & Timezone ---
  const lang = navigator.language || '未知';
  const langs = navigator.languages?.join(', ') || lang;
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '未知';

  // --- Cookie & Online ---
  const cookieEnabled = navigator.cookieEnabled;
  const online = navigator.onLine;

  // --- Memory ---
  const memoryGB = navigator.deviceMemory ? (navigator.deviceMemory + ' GB') : '未知';

  // --- Hardware Concurrency ---
  const cores = navigator.hardwareConcurrency || '未知';

  // --- Touch Support ---
  const touchSupported = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  // --- Connection ---
  let networkType = '未知';
  let networkDownlink = '';
  let networkRtt = '';
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (conn) {
    const typeMap = { bluetooth: '蓝牙', cellular: '蜂窝网络', ethernet: '有线网络', wifi: 'Wi-Fi', wimax: 'WiMAX', other: '其他', unknown: '未知', none: '无连接' };
    networkType = typeMap[conn.effectiveType] || conn.effectiveType || '未知';
    if (conn.downlink != null) networkDownlink = conn.downlink + ' Mbps';
    if (conn.rtt) networkRtt = conn.rtt + ' ms';
  }

  // --- Battery ---
  let batteryLevel = '未知';
  let batteryCharging = '未知';
  let batteryLevelRaw = null;
  let isCharging = null;
  if ('getBattery' in navigator) {
    try {
      const battery = await navigator.getBattery();
      batteryLevelRaw = Math.round(battery.level * 100);
      batteryLevel = batteryLevelRaw + '%';
      isCharging = battery.charging;
      batteryCharging = battery.charging ? '🔌 充电中' : '🔋 使用电池';
      // listen for changes
      battery.addEventListener('levelchange', () => location.reload());
      battery.addEventListener('chargingchange', () => location.reload());
    } catch { /* ignore */ }
  }

  // --- IP (multi-source) ---
  const ipSources = [
    { label: 'ipify', fn: () => getIpFromSource('https://api.ipify.org?format=json', d => d.ip) },
    { label: 'httpbin', fn: () => getIpFromSource('https://httpbin.org/ip', d => d.origin) },
    { label: 'ipapi', fn: () => getIpFromSource('https://ipapi.co/json/', d => d.ip) },
    { label: 'ip.sb', fn: () => getIpFromSource('https://api.ip.sb/geoip', d => d.ip) },
  ];
  const ipResults = await Promise.all(ipSources.map(async s => ({ label: s.label, ip: await s.fn() })));
  const validIps = ipResults.filter(r => r.ip);
  const primaryIp = validIps[0]?.ip || '无法获取';
  const allIps = validIps.map(r => r.ip).filter((v, i, a) => a.indexOf(v) === i);
  const ipDetail = validIps.map(r => `${r.label}: ${r.ip}`).join(' / ') || '无';

  // --- Geo from ipapi ---
  let geoInfo = '未知';
  let geoDetail = '';
  try {
    const geoRes = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(5000) });
    if (geoRes.ok) {
      const geo = await geoRes.json();
      const parts = [geo.city, geo.region, geo.country_name].filter(Boolean);
      geoInfo = parts.join(', ') || '未知';
      geoDetail = [geo.ip, geo.org, geo.postal].filter(Boolean).join(' | ');
    }
  } catch { /* ignore */ }

  // ============ Render ============

  // --- Stats Bar ---
  const statsBar = document.getElementById('statsBar');
  statsBar.innerHTML = [
    { icon: '🖥️', label: '操作系统', value: osName },
    { icon: '🌐', label: '浏览器', value: browserName + (browserVersion ? ' ' + browserVersion : '') },
    { icon: '📐', label: '分辨率', value: screenW + 'x' + screenH },
    { icon: online ? '🟢' : '🔴', label: '网络', value: online ? '在线' : '离线' },
  ].map(s => `<div class="stat-mini"><div class="stat-icon">${s.icon}</div><div class="stat-label">${s.label}</div><div class="stat-value">${s.value}</div></div>`).join('');

  // --- System Section ---
  document.getElementById('sectionSystem').innerHTML = [
    card('🌐', '浏览器', browserName, '版本 ' + (browserVersion || '未知')),
    card('💻', '操作系统', osName),
    card('🖥️', '屏幕分辨率', screenW + ' x ' + screenH, `可用: ${availW} x ${availH} | 色深: ${colorDepth}-bit`),
    card('🔍', '设备像素比', dpr + 'x', dpr >= 2 ? 'Retina / 高清屏' : '标准屏'),
    card('🌍', '语言', lang, `备选: ${langs}`),
    card('🕐', '时区', tz),
    cardWithBadge('🍪', 'Cookie', cookieEnabled ? '已启用' : '已禁用', cookieEnabled ? 'OK' : 'OFF', cookieEnabled ? 'badge-yes' : 'badge-no'),
    cardWithBadge('📶', '在线状态', online ? '在线' : '离线', online ? 'ON' : 'OFF', online ? 'badge-yes' : 'badge-no'),
  ].join('');

  // --- Network Section ---
  document.getElementById('sectionNetwork').innerHTML = [
    card('📡', '网络类型', networkType, networkDownlink ? `下行: ${networkDownlink}` + (networkRtt ? ` | RTT: ${networkRtt}` : '') : ''),
    card('📍', 'IP 地址', primaryIp, ipDetail),
    card('🗺️', '地理位置', geoInfo, geoDetail),
  ].join('');

  // --- Hardware Section ---
  document.getElementById('sectionHardware').innerHTML = [
    card('🧠', '内存 (RAM)', memoryGB),
    card('⚙️', 'CPU 核心数', typeof cores === 'number' ? cores + ' 核' : cores),
    cardWithBadge('👆', '触摸屏', touchSupported ? '支持' : '不支持', touchSupported ? 'YES' : 'NO', touchSupported ? 'badge-yes' : 'badge-no'),
    (() => {
      let battHtml = `<div class="card-value">${batteryLevel}</div>`;
      let fillClass = '';
      if (batteryLevelRaw != null) {
        if (batteryLevelRaw <= 20) fillClass = ' danger';
        else if (batteryLevelRaw <= 40) fillClass = ' warning';
        battHtml += `<div class="battery-bar-wrap">
          <div class="battery-bar"><div class="battery-fill${fillClass}" style="width:${batteryLevelRaw}%"></div></div>
          <span style="font-size:0.8rem;color:var(--text-secondary);white-space:nowrap;">${isCharging ? '⚡' : ''}</span>
        </div>`;
      }
      battHtml += `<div class="card-value secondary">${batteryCharging}</div>`;
      return `<div class="card">
        <div class="card-icon">🔋</div>
        <div class="card-content">
          <div class="card-label">电池状态</div>
          ${battHtml}
        </div>
      </div>`;
    })(),
  ].join('');

  // --- UA ---
  document.getElementById('cardUA').innerHTML = `
    <div class="card-icon">📝</div>
    <div class="card-content">
      <div class="card-label">User Agent 字符串</div>
      <div class="card-value">${ua}</div>
    </div>
  `;

  // --- Store for copy ---
  window._deviceData = {
    browser: browserName + (browserVersion ? ' ' + browserVersion : ''),
    os: osName,
    screen: screenW + ' x ' + screenH,
    dpr: dpr + 'x',
    lang, langs, tz,
    cookie: cookieEnabled ? '已启用' : '已禁用',
    online: online ? '在线' : '离线',
    network: networkType + (networkDownlink ? ' (' + networkDownlink + ')' : ''),
    ip: primaryIp,
    ipSources: ipDetail,
    location: geoInfo + (geoDetail ? ' (' + geoDetail + ')' : ''),
    memory: memoryGB,
    cpuCores: (typeof cores === 'number' ? cores + ' 核' : cores),
    touch: touchSupported ? '支持' : '不支持',
    battery: batteryLevel + ' - ' + batteryCharging,
    ua: ua,
  };
}

// ============ Copy All ============
function copyAll() {
  const d = window._deviceData;
  if (!d) { showToast('请等待信息加载完成'); return; }
  const lines = [
    '========== 📱 我的设备信息 ==========',
    '',
    '--- 系统与浏览器 ---',
    `浏览器：${d.browser}`,
    `操作系统：${d.os}`,
    `屏幕分辨率：${d.screen}`,
    `设备像素比：${d.dpr}`,
    `语言：${d.lang} (${d.langs})`,
    `时区：${d.tz}`,
    `Cookie 状态：${d.cookie}`,
    `网络状态：${d.online}`,
    '',
    '--- 网络与位置 ---',
    `网络类型：${d.network}`,
    `IP 地址：${d.ip}`,
    `IP（多源）：${d.ipSources}`,
    `地理位置：${d.location}`,
    '',
    '--- 硬件状态 ---',
    `内存：${d.memory}`,
    `CPU 核心数：${d.cpuCores}`,
    `触摸屏：${d.touch}`,
    `电池：${d.battery}`,
    '',
    '--- User Agent ---',
    d.ua,
    '',
    '========================================',
    `生成时间：${new Date().toLocaleString()}`,
  ];
  navigator.clipboard.writeText(lines.join('\n')).then(
    () => showToast('✅ 已复制全部设备信息'),
    () => showToast('❌ 复制失败，请重试')
  );
}

// ============ Init ============
detectAll();
</script>
</body>
</html>
